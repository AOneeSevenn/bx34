<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>X4 — Bio Profil</title>
    <!-- Google Fonts & Font Awesome -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0b0c10 0%, #0f1117 100%);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            position: relative;
        }

        /* efek grid halus */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .card {
            max-width: 540px;
            width: 100%;
            background: rgba(18, 22, 30, 0.75);
            backdrop-filter: blur(18px);
            border-radius: 3rem;
            padding: 2rem 2rem 2.2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            z-index: 2;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 50px -15px rgba(0, 0, 0, 0.7);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* Avatar area */
        .avatar-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 1.2rem;
        }

        .avatar {
            background: linear-gradient(135deg, #1e2a3a, #0f1722);
            width: 110px;
            height: 110px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 25px -8px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .avatar span {
            font-size: 3.7rem;
            font-weight: 800;
            background: linear-gradient(120deg, #F0F3FA, #B0C4DE);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 2px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* Nama utama */
        .name {
            text-align: center;
            font-size: 2.3rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #FFFFFF, #C0D4FF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.3rem;
        }

        .badge {
            text-align: center;
            display: flex;
            justify-content: center;
            gap: 0.6rem;
            margin-bottom: 1.6rem;
            flex-wrap: wrap;
        }

        .badge-item {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
            padding: 0.2rem 0.9rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #b9c7dd;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            letter-spacing: 0.3px;
        }

        .bio-text {
            text-align: center;
            color: #b3c2db;
            font-weight: 400;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            padding: 0 0.5rem;
            line-height: 1.45;
        }

        /* link list */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .link-card {
            background: rgba(12, 15, 22, 0.7);
            border-radius: 2rem;
            transition: all 0.25s;
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
        }

        .link-card:hover {
            background: rgba(28, 35, 48, 0.85);
            border-color: rgba(255, 255, 255, 0.25);
            transform: scale(1.01);
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.9rem 1.5rem;
            text-decoration: none;
            color: #eef3ff;
            font-weight: 500;
            gap: 0.8rem;
        }

        .left-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .icon-circle {
            width: 42px;
            height: 42px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: 0.2s;
        }

        .link-card:hover .icon-circle {
            background: rgba(255, 255, 255, 0.18);
            transform: scale(1.02);
        }

        .platform-name {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: -0.2px;
        }

        .platform-handle {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 2px;
            font-weight: 400;
        }

        .visit-btn {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.45rem 1rem;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            transition: 0.2s;
            color: white;
            border: 0.5px solid rgba(255,255,240,0.2);
            letter-spacing: 0.3px;
        }

        .link-card:hover .visit-btn {
            background: #2d68ff;
            border-color: #5c8eff;
            box-shadow: 0 2px 10px rgba(45, 104, 255, 0.3);
        }

        /* by X47 footer */
        .footer-by {
            text-align: center;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
            font-size: 0.85rem;
            font-weight: 500;
            color: #8f9bb3;
            letter-spacing: 0.5px;
        }

        .footer-by span {
            color: #b7c9ff;
            font-weight: 700;
            background: linear-gradient(120deg, #cddcff, #9bb4ff);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        /* efek glow subtle */
        .glow-effect {
            position: relative;
        }

        /* responsive */
        @media (max-width: 480px) {
            .card {
                padding: 1.5rem;
            }
            .name {
                font-size: 1.9rem;
            }
            .link-btn {
                padding: 0.7rem 1.2rem;
            }
            .icon-circle {
                width: 36px;
                height: 36px;
                font-size: 1.3rem;
            }
            .platform-name {
                font-size: 0.95rem;
            }
            .visit-btn {
                padding: 0.35rem 0.85rem;
                font-size: 0.7rem;
            }
        }

        /* tooltip cantik opsional */
        .link-card {
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="card">
    <!-- Avatar dengan inisial X4 -->
    <div class="avatar-wrapper">
        <div class="avatar">
            <span>X3</span>
        </div>
    </div>

    <!-- Nama profil utama = X4 -->
    <div class="name"></div>

    <!-- badge mini / status -->
    <div class="badge">
        <div class="badge-item"><i class="fas fa-bolt" style="margin-right: 5px;"></i> </div>
        <div class="badge-item"><i class="fas fa-music"></i> </div>
        <div class="badge-item"><i class="fas fa-globe"></i> </div>
    </div>

    <!-- bio singkat aesthetic -->
    <div class="bio-text">
        <i class="fas fa-quote-left" style="opacity: 0.6; margin-right: 5px;"></i> 
       
        <i class="fas fa-quote-right" style="opacity: 0.6; margin-left: 5px;"></i>
    </div>

    <!-- Daftar link dengan tombol kunjungi -->
    <div class="links-list">
        <!-- TikTok Link -->
        <div class="link-card" data-url="https://www.tiktok.com/@x_seven6?_r=1&_t=ZS-95KujK5qMYG">
            <a href="https://www.tiktok.com/@x_seven6?_r=1&_t=ZS-95KujK5qMYG" target="_blank" rel="noopener noreferrer" class="link-btn">
                <div class="left-info">
                    <div class="icon-circle"><i class="fab fa-tiktok"></i></div>
                    <div>
                        <div class="platform-name">TikTok</div>
                        <div class="platform-handle"></div>
                    </div>
                </div>
                <div class="visit-btn">Kunjungi <i class="fas fa-arrow-right" style="margin-left: 5px; font-size: 0.7rem;"></i></div>
            </a>
        </div>

        <!-- YouTube Link -->
        <div class="link-card" data-url="https://youtube.com/@amsb7i5?si=7Ho8ZFIcIxJbByJa">
            <a href="https://youtube.com/@amsb7i5?si=7Ho8ZFIcIxJbByJa" target="_blank" rel="noopener noreferrer" class="link-btn">
                <div class="left-info">
                    <div class="icon-circle"><i class="fab fa-youtube"></i></div>
                    <div>
                        <div class="platform-name">YouTube</div>
                        <div class="platform-handle"></div>
                    </div>
                </div>
                <div class="visit-btn">Kunjungi <i class="fas fa-arrow-right" style="margin-left: 5px; font-size: 0.7rem;"></i></div>
            </a>
        </div>

        <!-- X (Twitter) Link -->
        <div class="link-card" data-url="https://x.com/TioHzll">
            <a href="https://x.com/TioHzll" target="_blank" rel="noopener noreferrer" class="link-btn">
                <div class="left-info">
                    <div class="icon-circle"><i class="fab fa-twitter"></i></div>
                    <div>
                        <div class="platform-name">X (Twitter)</div>
                        <div class="platform-handle"></div>
                    </div>
                </div>
                <div class="visit-btn">Kunjungi <i class="fas fa-arrow-right" style="margin-left: 5px; font-size: 0.7rem;"></i></div>
            </a>
        </div>
    </div>

    <!-- Tulisan By X47 sesuai permintaan -->
    <div class="footer-by">
        ✦ <span>By X47</span> ✦
    </div>
</div>

<!-- tiny script untuk efek tambahan (opsional, interaksi smooth) -->
<script>
    (function() {
        // hanya memberikan efek visual kecil pada hover card (sudah via css)
        // tapi juga memastikan semua link terbuka di tab baru (sudah pakai target="_blank")
        // tidak ada perubahan besar, namun bisa menambahkan konfirmasi atau tracking bila diperlukan
        // sesuai permintaan: semua tombol "kunjungi" mengarah ke link masing-masing

        // jika ingin menambahkan efek animasi tambahan pada load
        const card = document.querySelector('.card');
        if(card) {
            card.style.opacity = '0';
            card.style.transform = 'translateY(15px)';
            setTimeout(() => {
                card.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 80);
        }

        // memberikan sentuhan aksesibilitas: menambah title pada tombol
        const allBtns = document.querySelectorAll('.visit-btn');
        allBtns.forEach(btn => {
            btn.setAttribute('aria-label', 'Buka halaman sosial media');
        });

        // menambahkan efek micro interaksi pada link-card (ripple tiny)
        const linkCards = document.querySelectorAll('.link-card');
        linkCards.forEach(card => {
            card.addEventListener('click', (e) => {
                // Jangan ganggu jika yang diklik adalah anchor atau di dalam anchor (sudah di-handle)
                if(e.target.closest('a')) return;
                const anchor = card.querySelector('a');
                if(anchor) {
                    anchor.click();
                }
            });
            // efek keyboard
            card.setAttribute('role', 'button');
            card.setAttribute('tabindex', '0');
            card.addEventListener('keydown', (e) => {
                if(e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    const anchor = card.querySelector('a');
                    if(anchor) anchor.click();
                }
            });
        });
    })();
</script>
</body>
</html>
